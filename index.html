<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>RGB QR Multiplexer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

  <div class="container">
    <h1>RGB Multiplexer</h1>

    <input type="text" id="inputRed" placeholder="Текст для КРАСНОГО канала">
    <input type="text" id="inputGreen" placeholder="Текст для ЗЕЛЕНОГО канала">
    <input type="text" id="inputBlue" placeholder="Текст для СИНЕГО канала">

    <div class="buttons">
      <button id="generateBtn" style="background: #622;">Создать RGB QR</button>
      <button id="scanBtn">Открыть Сканер</button>
    </div>

    <div id="qrResult"></div>
    <div id="scanResult"></div>
  </div>

  <div id="scannerOverlay" class="scanner-overlay" style="display: none;">
    <div class="scanner-container">
      <h2>Выберите канал для чтения:</h2>
      
      <div class="buttons" style="margin-bottom: 10px;">
        <button onclick="setChannel('R')" style="background: #822;">Red</button>
        <button onclick="setChannel('G')" style="background: #282;">Green</button>
        <button onclick="setChannel('B')" style="background: #228;">Blue</button>
      </div>

      <video id="video" autoplay playsinline></video>
      <div class="scan-frame"></div>
      
      <button id="closeScanner">Закрыть</button>
      <div id="scanMessage"></div>
    </div>
  </div>

  <script src="js/core.js"></script>
</body>
</html>
